<script>
  const frame = document.getElementById("frame");
  let currentUrl = "https://duckduckgo.com/";

  function post(type, extra = {}) {
    parent.postMessage({ type, ...extra }, "*");
  }

  function navigate(url) {
    if (!url) return;
    currentUrl = url;
    post("browser:loading");
    frame.src = url;
    post("browser:url-changed", { url });
  }

  window.addEventListener("message", (e) => {
    const data = e.data || {};

    if (data.type === "browser:navigate" && data.url) {
      navigate(data.url);
    }

    if (data.type === "browser:reload") {
      frame.src = currentUrl || "https://duckduckgo.com/";
    }

    if (data.type === "browser:back") {
      try { frame.contentWindow.history.back(); } catch {}
    }

    if (data.type === "browser:forward") {
      try { frame.contentWindow.history.forward(); } catch {}
    }
  });

  frame.addEventListener("load", () => {
    post("browser:connected");
    try {
      const url = frame.contentWindow.location.href;
      if (url && url !== "about:blank") {
        currentUrl = url;
        post("browser:url-changed", { url });
      } else {
        post("browser:url-changed", { url: currentUrl });
      }
    } catch {
      post("browser:url-changed", { url: currentUrl });
    }
  });

  navigate(currentUrl);
</script>
